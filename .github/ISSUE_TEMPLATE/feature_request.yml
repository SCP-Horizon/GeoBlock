name: Feature request
description: Suggest a new capability or improvement for GeoBlock.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a feature. Please
        describe the underlying problem first, then your idea.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today, or what is painful with the current behavior?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How could GeoBlock solve this? Mention config keys, command names or new files if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they fall short.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Use cases, screenshots, references to similar features in other plugins.
    validations:
      required: false

  - type: checkboxes
    id: confirm
    attributes:
      label: Pre-flight checks
      options:
        - label: I have searched existing issues for similar requests.
          required: true
