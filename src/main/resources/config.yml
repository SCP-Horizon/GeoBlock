# =====================================================================
# GeoBlock configuration
#
# Filter Minecraft connections based on the country resolved from the
# player's IP address using a local MMDB database.
# =====================================================================

# Filtering mode applied to the country list below.
#   blacklist : countries listed are denied, everyone else is allowed
#   whitelist : only countries listed are allowed, everyone else denied
mode: blacklist

# ISO 3166-1 alpha-2 country codes (uppercase) used by the filter.
# Examples: FR, BE, CA, RU, KP, US.
countries:
  - RU
  - KP

# What to do when the IP cannot be resolved to a country
# (private IPs, lookup error, missing database).
#   allow : let the player connect (fail-open, recommended)
#   deny  : refuse the connection (fail-closed, strict)
on-lookup-failure: allow

# Country database settings.
geoip:
  # Where the country MMDB comes from.
  #   db-ip   : free, no account, monthly update from db-ip.com.
  #             Database licensed under CC-BY 4.0; please keep the
  #             attribution in the README intact.
  #   maxmind : MaxMind GeoLite2-Country. Requires a free license key.
  #             Use this if you also enable VPN detection below.
  provider: db-ip

  # MaxMind license key, only used when provider=maxmind.
  # Get one for free at https://www.maxmind.com/en/geolite2/signup.
  license-key: ""

  # Automatically download and refresh the country database.
  auto-update: true

  # How often to check for database updates, in hours. db-ip releases
  # one update per month, so weekly (168h) or longer is plenty.
  update-interval-hours: 168

  # Path to the country MMDB file, relative to the plugin data folder
  # or absolute. The plugin writes the downloaded database here.
  database-path: "country.mmdb"

# Optional VPN / proxy detection through the MaxMind GeoIP2
# Anonymous-IP database. Disabled by default.
#
# IMPORTANT: GeoIP2-Anonymous-IP is a PAID MaxMind product. Enabling
# this requires a MaxMind subscription and a license key set under
# geoip.license-key. db-ip does not offer an equivalent free dataset.
vpn-detection:
  enabled: false

  # Path to the GeoIP2-Anonymous-IP MMDB file, relative to the plugin
  # data folder, or absolute. Provide the file manually if you do not
  # have a GeoIP2 subscription configured for automatic updates.
  database-path: "GeoIP2-Anonymous-IP.mmdb"

  # When a VPN/proxy is detected, refuse the connection. When false,
  # detection runs but only the regular country filter decides whether
  # the player is allowed to connect.
  block-on-detection: true

# Discord webhook used to notify staff when a connection is denied
# or when the GeoIP check could not produce a country.
discord:
  # Full webhook URL, leave empty to disable notifications.
  webhook-url: ""

  # Include the player's IP address in the embed. Disable to comply
  # with stricter privacy requirements.
  include-ip: true

  # Display name used in the webhook message.
  username: "GeoBlock"

  # Send a webhook when the GeoIP check cannot determine a country
  # (private/local IP, address not in DB, missing database). Useful
  # to notice silently misconfigured servers, but generates one
  # message per local connection during testing.
  notify-lookup-failure: true
