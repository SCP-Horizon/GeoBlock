name: GeoBlock
version: '${version}'
description: Filters connections by country with optional VPN detection and Discord webhook notifications.
author: Orchiwi

main: fr.horizonsmp.geoBlock.GeoBlock
api-version: '26.1.2'
load: POSTWORLD

softdepend:
  - LuckPerms

commands:
  geoblock:
    description: GeoBlock administration commands.
    usage: /<command> [reload|bypass|update|help]
    aliases: [gb]
    permission: geoblock.admin

permissions:
  geoblock.admin:
    description: Full access to GeoBlock commands.
    default: op
    children:
      geoblock.command.reload: true
      geoblock.command.bypass: true
      geoblock.command.update: true
  geoblock.command.reload:
    description: Allows reloading the GeoBlock configuration.
    default: op
  geoblock.command.bypass:
    description: Allows managing the IP and UUID bypass list.
    default: op
  geoblock.command.update:
    description: Allows triggering an immediate MaxMind database download.
    default: op
